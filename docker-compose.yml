services:
  tuensso:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tuensso
      SPRING_DATASOURCE_USERNAME: tuensso
      SPRING_DATASOURCE_PASSWORD: tuensso123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      TUENSSO_ISSUER: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tuensso
      POSTGRES_USER: tuensso
      POSTGRES_PASSWORD: tuensso123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuensso"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
