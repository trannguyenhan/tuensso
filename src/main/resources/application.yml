server:
  port: 8080

spring:
  application:
    name: tuensso

  datasource:
    url: jdbc:mariadb://localhost:3306/tuensso
    username: tuensso
    password: ${DB_PASSWORD:tuensso}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/${tuensso.db-type:mariadb}

  thymeleaf:
    cache: false

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.security.oauth2.server.authorization: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

tuensso:
  issuer: http://localhost:8080
  logo-upload-dir: ./data/app-logos
  db-type: mariadb
