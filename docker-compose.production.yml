# Production — pull from Docker Hub, connect to external database
# Usage: cp .env.example .env && docker compose -f docker-compose.production.yml up -d
#
# MariaDB (default): DB_URL=jdbc:mariadb://host:3306/tuensso
# PostgreSQL:        DB_TYPE=postgresql  DB_URL=jdbc:postgresql://host:5432/tuensso

services:
  tuensso:
    image: tuensso/tuensso:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL:?Set DB_URL in .env}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:?Set DB_USER in .env}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      TUENSSO_ISSUER: ${TUENSSO_ISSUER:-http://localhost:8080}
      TUENSSO_DB_TYPE: ${DB_TYPE:-mariadb}
      TUENSSO_LOGO_UPLOAD_DIR: /data/app-logos
      TUENSSO_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      TUENSSO_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      TUENSSO_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tuensso.local}
    volumes:
      - logos:/data/app-logos
    restart: unless-stopped

volumes:
  logos:
